/* SECCIÓN EVENTOS */
.grid-events {

  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}
.card-event {

/* SECCIÓN DE FOTOS DE EVENTOS */
.events-photos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 28px;
}
.event-photo {
  position: relative;
  width: 100%;
  height: 180px;
  border-radius: 12px;
  overflow: hidden;
  background: #ddd;
}
.event-photo img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;

.event-photo:hover img { transform: scale(1.05); }

.testi-card {
  background: #fff;
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  margin: 12px;

.testi-author { font-weight: 600; font-size: 0.95rem; margin-top: 6px; color: #333; }
.testi-text { font-size: 0.95rem; color: #555; line-height: 1.4; }

.carousel {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 100%;
  overflow: hidden;
  width: 100%;
  scroll-snap-type: x mandatory;
}
.carousel__slide {
  scroll-snap-align: center;
}
.carousel-controls {
  display: flex; justify-content: center; gap: 8px; margin-top: 8px;
}
.btn-dot {
  width: 10px; height: 10px; border-radius: 50%; background: #bbb; border: none; cursor: pointer;
}
.btn-dot.active { background: var(--gold); }

/* SECCIÓN TOUR 360 */

  background: var(--dark);
  color: white;
  padding: 100px 20px;
  text-align: center;
  border-radius: 50px;

  text-decoration: none;
  display: inline-block;
  margin-top: 25px;
  transition: 0.4s;
  border-radius: 50px;

.btn-tour:hover { background: var(--gold); color: white; }

/* SECCIÓN AVENTURA */
.adventure {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 50px;
  background: #f0ede9;

.adventure-img img { width: 100%; display: block; }

/* GALERÍA */
.gallery {

  gap: 15px;
}
.gallery-item { height: 300px; border-radius: 15px; overflow: hidden; position: relative; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.gallery-item:hover img { transform: scale(1.1); }

<script>
  // Splash de portada: mostrar durante 2 segundos y luego desvanecer sin recargar
  document.addEventListener('DOMContentLoaded', function() {
    const splash = document.getElementById('splash');
    // Mostrar solo una vez por pestaña
    const launched = sessionStorage.getItem('launched');
    if (!launched) {
      sessionStorage.setItem('launched', '1');
      // El splash ya está visible; tras 2 segundos lo ocultamos
      setTimeout(function() {
        splash.classList.add('hidden');
      }, 2000);
    } else {
      // Ya se mostró alguna vez: ocultar de inmediato
      splash.classList.add('hidden');
    }
  });

  // Inicialización de AOS
  AOS.init({ duration: 1000, once: true });

  // Simple carrusel de comentarios: sincronización de dots
  (function(){
    const slides = document.querySelectorAll('#comentarios .carousel__slide');
    const dots = document.querySelectorAll('.btn-dot');
    let index = 0;
    function show(i){
      slides.forEach((s,idx)=> {
        s.style.display = idx===i ? 'block' : 'none';
      });
      dots.forEach((d,idx)=> d.classList.toggle('active', idx===i));
    }
    // inicial
    show(0);
    // controles
    dots.forEach((d, idx) => {
      d.addEventListener('click', ()=> { index = idx; show(index); });
    });
    // Auto-rotate cada 6 segundos
    setInterval(()=>{ index = (index+1) % slides.length; show(index); }, 6000);
  })();
</script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
